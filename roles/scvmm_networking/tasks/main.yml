---
- name: Valider la structure de scvmm_networking
  ansible.builtin.assert:
    that:
      - scvmm.management_server is defined
      - (scvmm.management_server | string | length) > 0
      - (scvmm.port | int) > 0
      - scvmm_networking is mapping
      - scvmm_networking.logical_networks is mapping
      - scvmm_networking.vm_networks is mapping
      - scvmm_networking.port_profiles is mapping
      - scvmm_networking.logical_switches is mapping
      - scvmm_networking.virtual_switches is mapping

- name: Configurer le réseau SCVMM
  ansible.windows.win_powershell:
    script: |
      Import-Module VirtualMachineManager

      $isCheckMode = {{ (ansible_check_mode or scvmm_networking.check_only) | ternary('$true', '$false') }}
      $server = Get-SCVMMServer -ComputerName "{{ scvmm.management_server }}" -TCPPort {{ scvmm.port }}

      function Has-Command {
        param([Parameter(Mandatory=$true)][string]$Name)
        return $null -ne (Get-Command -Name $Name -ErrorAction SilentlyContinue)
      }

      function Emit-Result {
        param(
          [Parameter(Mandatory=$true)][string]$Scope,
          [Parameter(Mandatory=$true)][string]$Message,
          [Parameter(Mandatory=$true)][bool]$Changed
        )
        if ($Changed) { Write-Output ("CHANGED: [$Scope] $Message") }
        else           { Write-Output ("UNCHANGED: [$Scope] $Message") }
      }

      # -------------------------
      # Logical Networks
      # -------------------------
      $logicalEnabled = [System.Convert]::ToBoolean("{{ scvmm_networking.logical_networks.enabled | bool }}")
      if ($logicalEnabled) {
        if (-not (Has-Command -Name 'Get-SCLogicalNetwork') -or -not (Has-Command -Name 'New-SCLogicalNetwork')) {
          Write-Output 'INFO: Cmdlets logical network indisponibles, bloc ignoré'
        }
        else {
          $logicalNetworks = ConvertFrom-Json -InputObject @'
{{ scvmm_networking.logical_networks.items | default([]) | to_json }}
'@

          foreach ($entry in @($logicalNetworks)) {
            $name        = [string]$entry.name
            $description = [string]$entry.description
            if ([string]::IsNullOrWhiteSpace($name)) {
              throw 'logical_networks.items[].name est obligatoire'
            }

            $existing = Get-SCLogicalNetwork -VMMServer $server | Where-Object { $_.Name -eq $name } | Select-Object -First 1
            if ($existing) {
              Emit-Result -Scope 'logical_network' -Message "EXISTS $name" -Changed:$false
              continue
            }

            if ($isCheckMode) {
              Emit-Result -Scope 'logical_network' -Message "WOULD_CREATE $name" -Changed:$true
              continue
            }

            $params = @{ VMMServer = $server; Name = $name }
            if (-not [string]::IsNullOrWhiteSpace($description)) { $params['Description'] = $description }

            New-SCLogicalNetwork @params | Out-Null
            Emit-Result -Scope 'logical_network' -Message "CREATED $name" -Changed:$true
          }
        }
      }

      # -------------------------
      # VM Networks
      # -------------------------
      $vmNetworkEnabled = [System.Convert]::ToBoolean("{{ scvmm_networking.vm_networks.enabled | bool }}")
      if ($vmNetworkEnabled) {
        if (-not (Has-Command -Name 'Get-SCVMNetwork') -or -not (Has-Command -Name 'New-SCVMNetwork')) {
          Write-Output 'INFO: Cmdlets VM network indisponibles, bloc ignoré'
        }
        else {
          $vmNetworks = ConvertFrom-Json -InputObject @'
{{ scvmm_networking.vm_networks.items | default([]) | to_json }}
'@

          foreach ($entry in @($vmNetworks)) {
            $name               = [string]$entry.name
            $logicalNetworkName = [string]$entry.logical_network

            if ([string]::IsNullOrWhiteSpace($name) -or [string]::IsNullOrWhiteSpace($logicalNetworkName)) {
              throw 'vm_networks.items[].name et .logical_network sont obligatoires'
            }

            $existing = Get-SCVMNetwork -VMMServer $server | Where-Object { $_.Name -eq $name } | Select-Object -First 1
            if ($existing) {
              Emit-Result -Scope 'vm_network' -Message "EXISTS $name" -Changed:$false
              continue
            }

            $logicalNetwork = Get-SCLogicalNetwork -VMMServer $server | Where-Object { $_.Name -eq $logicalNetworkName } | Select-Object -First 1
            if (-not $logicalNetwork) {
              throw "Réseau logique '$logicalNetworkName' introuvable pour VM network '$name'"
            }

            if ($isCheckMode) {
              Emit-Result -Scope 'vm_network' -Message "WOULD_CREATE $name (logical: $logicalNetworkName)" -Changed:$true
              continue
            }

            New-SCVMNetwork -VMMServer $server -Name $name -LogicalNetwork $logicalNetwork | Out-Null
            Emit-Result -Scope 'vm_network' -Message "CREATED $name (logical: $logicalNetworkName)" -Changed:$true
          }
        }
      }

      # -------------------------
      # Port Profiles
      # -------------------------
      $ppEnabled = [System.Convert]::ToBoolean("{{ scvmm_networking.port_profiles.enabled | bool }}")
      if ($ppEnabled) {
        if (-not (Has-Command -Name 'Get-SCPortProfile') -or -not (Has-Command -Name 'New-SCUplinkPortProfile')) {
          Write-Output 'INFO: Cmdlets port profile indisponibles, bloc ignoré'
        }
        else {
          $portProfiles = ConvertFrom-Json -InputObject @'
{{ scvmm_networking.port_profiles.items | default([]) | to_json }}
'@

          foreach ($entry in @($portProfiles)) {
            $name        = [string]$entry.name
            $ppType      = [string]$entry.type
            $description = [string]$entry.description

            if ([string]::IsNullOrWhiteSpace($name)) {
              throw 'port_profiles.items[].name est obligatoire'
            }
            if ($ppType -notin @('Uplink', 'VirtualNetwork')) {
              throw "port_profiles.items[].type doit être Uplink ou VirtualNetwork (reçu: '$ppType')"
            }

            $existing = Get-SCPortProfile -VMMServer $server | Where-Object { $_.Name -eq $name } | Select-Object -First 1
            if ($existing) {
              Emit-Result -Scope 'port_profile' -Message "EXISTS $name" -Changed:$false
              continue
            }

            if ($isCheckMode) {
              Emit-Result -Scope 'port_profile' -Message "WOULD_CREATE $name (type=$ppType)" -Changed:$true
              continue
            }

            $params = @{ VMMServer = $server; Name = $name }
            if (-not [string]::IsNullOrWhiteSpace($description)) { $params['Description'] = $description }

            if ($ppType -eq 'Uplink') {
              $lbAlgo   = [string]$entry.load_balancing_algorithm
              $teamMode = [string]$entry.teaming_mode
              if (-not [string]::IsNullOrWhiteSpace($lbAlgo))   { $params['LoadBalancingAlgorithm'] = $lbAlgo }
              if (-not [string]::IsNullOrWhiteSpace($teamMode)) { $params['TeamingMode'] = $teamMode }
              New-SCUplinkPortProfile @params | Out-Null
            }
            else {
              New-SCVirtualNetworkAdapterPortProfile @params | Out-Null
            }

            Emit-Result -Scope 'port_profile' -Message "CREATED $name (type=$ppType)" -Changed:$true
          }
        }
      }

      # -------------------------
      # Logical Switches
      # -------------------------
      $lsEnabled = [System.Convert]::ToBoolean("{{ scvmm_networking.logical_switches.enabled | bool }}")
      if ($lsEnabled) {
        if (-not (Has-Command -Name 'Get-SCLogicalSwitch') -or -not (Has-Command -Name 'New-SCLogicalSwitch')) {
          Write-Output 'INFO: Cmdlets logical switch indisponibles, bloc ignoré'
        }
        else {
          $logicalSwitches = ConvertFrom-Json -InputObject @'
{{ scvmm_networking.logical_switches.items | default([]) | to_json }}
'@

          foreach ($entry in @($logicalSwitches)) {
            $name         = [string]$entry.name
            $description  = [string]$entry.description
            $uplinkPPName = [string]$entry.uplink_port_profile
            $minBwMode    = [string]$entry.minimum_bandwidth_mode
            $enableSriov  = if ($null -ne $entry.enable_sriov) { [System.Convert]::ToBoolean([string]$entry.enable_sriov) } else { $false }

            if ([string]::IsNullOrWhiteSpace($name)) {
              throw 'logical_switches.items[].name est obligatoire'
            }

            $existing = Get-SCLogicalSwitch -VMMServer $server | Where-Object { $_.Name -eq $name } | Select-Object -First 1
            if ($existing) {
              Emit-Result -Scope 'logical_switch' -Message "EXISTS $name" -Changed:$false
              continue
            }

            if ($isCheckMode) {
              Emit-Result -Scope 'logical_switch' -Message "WOULD_CREATE $name" -Changed:$true
              continue
            }

            $params = @{ VMMServer = $server; Name = $name; EnableSriov = $enableSriov }
            if (-not [string]::IsNullOrWhiteSpace($description)) { $params['Description'] = $description }
            if (-not [string]::IsNullOrWhiteSpace($minBwMode))   { $params['MinimumBandwidthMode'] = $minBwMode }

            $newSwitch = New-SCLogicalSwitch @params

            if (-not [string]::IsNullOrWhiteSpace($uplinkPPName)) {
              $uplinkPP = Get-SCUplinkPortProfile -VMMServer $server | Where-Object { $_.Name -eq $uplinkPPName } | Select-Object -First 1
              if (-not $uplinkPP) {
                Write-Output "INFO: [logical_switch] Uplink port profile '$uplinkPPName' introuvable pour '$name', association ignorée"
              }
              else {
                New-SCLogicalSwitchVirtualPortProfile -LogicalSwitch $newSwitch -UplinkPortProfile $uplinkPP | Out-Null
              }
            }

            Emit-Result -Scope 'logical_switch' -Message "CREATED $name" -Changed:$true
          }
        }
      }

      # -------------------------
      # Virtual Switches (déploiement via SCVMM)
      # -------------------------
      $vsEnabled = [System.Convert]::ToBoolean("{{ scvmm_networking.virtual_switches.enabled | bool }}")
      if ($vsEnabled) {
        $requiredCmds = @('Get-SCVMHost','Get-SCVMHostNetworkAdapter','Get-SCLogicalSwitch',
                          'Get-SCUplinkPortProfileSet','Set-SCVMHostNetworkAdapter',
                          'Install-SCVirtualSwitch','Get-SCVirtualSwitch')
        $missingCmd = $requiredCmds | Where-Object { -not (Has-Command -Name $_) }
        if ($missingCmd) {
          Write-Output ("INFO: Cmdlets virtual switch indisponibles ($($missingCmd -join ',')), bloc ignoré")
        }
        else {
          $vsEntries = ConvertFrom-Json -InputObject @'
{{ scvmm_networking.virtual_switches.items | default([]) | to_json }}
'@

          foreach ($entry in @($vsEntries)) {
            $logicalSwitchName = [string]$entry.logical_switch
            $uplinkPPName      = [string]$entry.uplink_port_profile
            $adapterName       = [string]$entry.net_adapter_name
            $targetHostGroup   = [string]$entry.host_group
            $targetCluster     = [string]$entry.cluster

            if ([string]::IsNullOrWhiteSpace($logicalSwitchName)) {
              throw 'virtual_switches.items[].logical_switch est obligatoire'
            }
            if ([string]::IsNullOrWhiteSpace($adapterName)) {
              throw 'virtual_switches.items[].net_adapter_name est obligatoire'
            }
            if ([string]::IsNullOrWhiteSpace($targetHostGroup) -and [string]::IsNullOrWhiteSpace($targetCluster)) {
              throw "virtual_switches.items[].host_group ou .cluster est obligatoire pour '$logicalSwitchName'"
            }

            $logicalSwitch = Get-SCLogicalSwitch -VMMServer $server | Where-Object { $_.Name -eq $logicalSwitchName } | Select-Object -First 1
            if (-not $logicalSwitch) {
              throw "Logical switch '$logicalSwitchName' introuvable dans SCVMM"
            }

            $targetHosts = @()
            if (-not [string]::IsNullOrWhiteSpace($targetCluster)) {
              $cl = Get-SCVMHostCluster -VMMServer $server | Where-Object { $_.Name -eq $targetCluster } | Select-Object -First 1
              if (-not $cl) { throw "Cluster '$targetCluster' introuvable dans SCVMM" }
              $targetHosts = @(Get-SCVMHost -VMMServer $server | Where-Object { $_.VMHostCluster -and $_.VMHostCluster.Name -eq $cl.Name })
            }
            else {
              $hg = Get-SCVMHostGroup -VMMServer $server | Where-Object { [string]$_.Path -eq $targetHostGroup } | Select-Object -First 1
              if (-not $hg) { throw "Host group '$targetHostGroup' introuvable dans SCVMM" }
              $targetHosts = @(Get-SCVMHost -VMMServer $server | Where-Object { [string]$_.VMHostGroup -eq $targetHostGroup -or [string]$_.HostGroupPath -like "$targetHostGroup*" })
            }

            if ($targetHosts.Count -eq 0) {
              Write-Output "INFO: [virtual_switch] Aucun hôte trouvé pour '$logicalSwitchName', bloc ignoré"
              continue
            }

            $uplinkPPSet = $null
            if (-not [string]::IsNullOrWhiteSpace($uplinkPPName)) {
              $uplinkPPSet = Get-SCUplinkPortProfileSet -VMMServer $server | Where-Object {
                $_.LogicalSwitch.Name -eq $logicalSwitchName -and $_.Name -eq $uplinkPPName
              } | Select-Object -First 1
            }
            if (-not $uplinkPPSet) {
              $uplinkPPSet = Get-SCUplinkPortProfileSet -VMMServer $server | Where-Object {
                $_.LogicalSwitch.Name -eq $logicalSwitchName
              } | Select-Object -First 1
            }

            foreach ($vmHost in $targetHosts) {
              $existingVS = Get-SCVirtualSwitch -VMMServer $server | Where-Object {
                $_.VMHost.Name -eq $vmHost.Name -and $_.LogicalSwitch -and $_.LogicalSwitch.Name -eq $logicalSwitchName
              } | Select-Object -First 1

              if ($existingVS) {
                Emit-Result -Scope 'virtual_switch' -Message "EXISTS $logicalSwitchName sur $($vmHost.Name)" -Changed:$false
                continue
              }

              $nic = Get-SCVMHostNetworkAdapter -VMHost $vmHost | Where-Object { $_.ConnectionName -eq $adapterName -or $_.Name -eq $adapterName } | Select-Object -First 1
              if (-not $nic) {
                Write-Output "INFO: [virtual_switch] Carte '$adapterName' introuvable sur $($vmHost.Name), hôte ignoré"
                continue
              }

              if ($isCheckMode) {
                Emit-Result -Scope 'virtual_switch' -Message "WOULD_DEPLOY $logicalSwitchName sur $($vmHost.Name) (adapter=$adapterName)" -Changed:$true
                continue
              }

              if ($uplinkPPSet) {
                Set-SCVMHostNetworkAdapter -VMHostNetworkAdapter $nic -UplinkPortProfileSet $uplinkPPSet | Out-Null
              }
              Install-SCVirtualSwitch -VMHost $vmHost -LogicalSwitch $logicalSwitch -VMHostNetworkAdapters @($nic) | Out-Null
              Emit-Result -Scope 'virtual_switch' -Message "DEPLOYED $logicalSwitchName sur $($vmHost.Name)" -Changed:$true
            }
          }
        }
      }
  register: scvmm_networking_result
  changed_when: >-
    scvmm_networking_result.output
    | map('string')
    | select('search', '^CHANGED:')
    | list
    | length > 0
