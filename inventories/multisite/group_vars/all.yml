---
# Exemple de modèle multisite. Surcharger par site/cluster selon vos besoins.

live_migration:
  enabled: true
  auth_protocol: CredSSP
  performance_option: SMB
  max_simultaneous_migrations: 4
  max_simultaneous_storage_migrations: 2
  use_any_network: false
  networks:
    - 10.10.100.0/24
    - 10.20.100.0/24

scvmm:
  management_server: scvmm01.contoso.local
  port: 8100

scvmm_live_migration:
  enforce_host_group: true
  check_only: false
  manage_storage_migrations: true
  manage_host_settings: true

sites:
  paris:
    clusters:
      - name: CLU-PARIS-HV
        hyperv_nodes:
          - hvparis01.contoso.local
          - hvparis02.contoso.local
        scvmm_host_group: Paris/Production
        live_migration:
          max_simultaneous_migrations: 6
          networks:
            - 10.10.100.0/24
  lyon:
    clusters:
      - name: CLU-LYON-HV
        hyperv_nodes:
          - hvlyon01.contoso.local
        scvmm_host_group: Lyon/Production
        live_migration:
          max_simultaneous_migrations: 3
          networks:
            - 10.20.100.0/24

# ---------------------------------------------------------------------------
# Configuration hôte Hyper-V (hors Live Migration).
# Désactivée par défaut ; activer les blocs souhaités dans host_vars ou ici.
# ---------------------------------------------------------------------------
hyperv_host_config:
  check_only: false

  storage:
    enabled: false
    virtual_hard_disk_path: "C:\\ClusterStorage\\Volume1\\VHDs"
    virtual_machine_path:   "C:\\ClusterStorage\\Volume1\\VMs"

  numa:
    enabled: false
    spanning_enabled: true

  enhanced_session_mode:
    enabled: false
    allow: true
    allow_user: true

  resource_metering:
    enabled: false
    enable: false

# ---------------------------------------------------------------------------
# Virtual switches Hyper-V.
# Désactivé par défaut ; activer et décrire les switches dans host_vars.
# ---------------------------------------------------------------------------
hyperv_vswitch:
  check_only: false
  enabled: false
  items: []
  # Exemple :
  # items:
  #   - name: vSwitch-Prod
  #     type: External
  #     net_adapter_name: "Ethernet 1"
  #     allow_management_os: true
  #     notes: Switch de production
  #   - name: vSwitch-Mgmt
  #     type: Internal

# ---------------------------------------------------------------------------
# Objets SCVMM hors Live Migration (désactivés par défaut).
# ---------------------------------------------------------------------------
scvmm_core_config:
  check_only: false

  host_groups:
    enabled: true
    items:
      - path: Paris/Production
      - path: Lyon/Production

  library_shares:
    enabled: false
    items:
      - name: LIB-PARIS-ISO
        path: \\\\filesrv01\\scvmm-lib-paris
        description: Bibliothèque ISO Paris

  logical_networks:
    enabled: false
    items:
      - name: LN-PROD
        description: Réseau logique de production
      - name: LN-MGMT
        description: Réseau logique de gestion

  vm_networks:
    enabled: false
    items:
      - name: VMNET-PROD
        logical_network: LN-PROD
      - name: VMNET-MGMT
        logical_network: LN-MGMT

  clouds:
    enabled: false
    items:
      - name: CLOUD-PROD-FR
        vm_host_groups:
          - Paris/Production
          - Lyon/Production
        description: Cloud production France

  storage_classifications:
    enabled: false
    items:
      - name: GOLD
        description: Stockage SSD haute performance
      - name: SILVER
        description: Stockage SAS standard
      - name: BRONZE
        description: Stockage SATA archivage

  port_profiles:
    enabled: false
    items:
      - name: PP-UPLINK-PROD
        type: Uplink
        description: Profil uplink production
        load_balancing_algorithm: HyperVPort
        teaming_mode: SwitchIndependent
      - name: PP-VNET-PROD
        type: VirtualNetwork
        description: Profil réseau VM production

  logical_switches:
    enabled: false
    items:
      - name: LS-PROD
        description: Logical switch production
        uplink_port_profile: PP-UPLINK-PROD
        minimum_bandwidth_mode: Default
        enable_sriov: false

  hardware_profiles:
    enabled: false
    items:
      - name: HW-2vCPU-4GB
        description: 2 vCPU, 4 Go RAM dynamique
        cpu_count: 2
        memory_mb: 4096
        dynamic_memory_enabled: true
        dynamic_memory_min_mb: 512
        dynamic_memory_max_mb: 8192
        dynamic_memory_buffer_pct: 20
      - name: HW-4vCPU-8GB
        description: 4 vCPU, 8 Go RAM statique
        cpu_count: 4
        memory_mb: 8192
        dynamic_memory_enabled: false

  user_roles:
    enabled: false
    items:
      - name: Admins-Virtualisation
        profile: Administrator
        description: Administrateurs de la couche virtualisation
        members:
          - CONTOSO\GRP-Admins-HV
      - name: Ops-VM-Paris
        profile: VMAdmin
        description: Opérateurs VM site Paris
        members:
          - CONTOSO\GRP-Ops-Paris
        scopes:
          - Paris/Production
      - name: Ops-VM-Lyon
        profile: VMAdmin
        description: Opérateurs VM site Lyon
        members:
          - CONTOSO\GRP-Ops-Lyon
        scopes:
          - Lyon/Production
