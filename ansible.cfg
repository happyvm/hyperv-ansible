[defaults]
inventory          = inventories/multisite
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = yaml
# Ajuster selon la bande passante et le nombre de nœuds.
forks              = 10

[inventory]
# Activer le cache d'inventaire si l'inventaire est dynamique.
# cache = yes
# cache_plugin = jsonfile
# cache_connection = /tmp/ansible_inventory_cache

[connection]
# Connexion WinRM par défaut pour tous les hôtes Windows.
pipelining = True

[winrm]
# Le transport (basic/ntlm/kerberos/credssp) est normalement défini
# dans group_vars via ansible_winrm_transport.
# Timeout de connexion WinRM (secondes).
operation_timeout_sec = 60
read_timeout_sec      = 70
