---
# Playbook dédié à la configuration hôte Hyper-V (hors Live Migration).
# Couvre : chemins de stockage, NUMA, Enhanced Session Mode, resource metering.
# Les virtual switches sont gérés par SCVMM via scvmm_core_config.virtual_switches.

- name: Configurer les paramètres hôte Hyper-V
  hosts: hyperv_nodes
  gather_facts: false

  pre_tasks:
    - name: Valider les paramètres hyperv_host_config
      ansible.builtin.assert:
        that:
          - hyperv_host_config is mapping
          - hyperv_host_config.storage is mapping
          - hyperv_host_config.numa is mapping
          - hyperv_host_config.enhanced_session_mode is mapping
          - hyperv_host_config.resource_metering is mapping
        fail_msg: "Structure hyperv_host_config invalide pour {{ inventory_hostname }}"

  tasks:
    - name: Appliquer la configuration hôte Hyper-V
      ansible.builtin.include_role:
        name: hyperv_host_config
